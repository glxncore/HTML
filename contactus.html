<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form 
        action="login.html"
        method="post"
        target="_blank"
        enctype="multipart/form-data">
    
    <label for="fullname">Full Name:</label>
    <input type="text" id="fullname" name="fullname" required>
    <br><br>
    <label for="emailid">Email ID:</label>
    <input type="email" id="emailid" name="emailid" required>
    <br><br>
    <label for="phonenumber">Phone Number:</label>
    <input type="tel" id="phonenumber" name="phonenumber" size="10" maxlength="10" pattern="[0-9]{10}" required>
    <br><br>
    <label for="message">Message:</label>
    <textarea id="message" name="message" required maxlength="1000" placeholder="Enter a message for admin"></textarea>
    <br><br>
    <input type="submit" value="Submit">
    </form>
    <footer>
        <p>&copy; 2026 Contact Us Company. All rights reserved.</p>
</body>
</html>
